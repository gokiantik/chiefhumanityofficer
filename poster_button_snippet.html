<style>
.poster-fab {
  position: fixed;
  bottom: 32px;
  right: 32px;
  z-index: 9999;
  background: #F5C842;
  color: #0D0D2B;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 12px 22px;
  border-radius: 40px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform 0.15s;
}
.poster-fab:hover { transform: translateY(-2px); }
</style>

<a class="poster-fab"
   href="https://gokiantik.github.io/chiefhumanityofficer/walking-books-poster.html"
   title="View Interactive Poster · Lihat Poster Interaktif">
  ✦ <span class="fab-en">View Poster</span><span class="fab-id" style="display:none">Lihat Poster</span>
</a>

<script>
/* Ikut toggle EN/ID yang sudah ada di halaman */
(function() {
  var en = document.querySelector('.fab-en');
  var id = document.querySelector('.fab-id');
  var orig = window.setLang || function(){};
  window.setLang = function(lang) {
    orig(lang);
    if (en && id) {
      en.style.display = lang === 'id' ? 'none' : 'inline';
      id.style.display = lang === 'id' ? 'inline' : 'none';
    }
  };
})();
</script>
